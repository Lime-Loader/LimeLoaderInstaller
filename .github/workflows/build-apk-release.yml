name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      DOTNET_ROOT: C:\Program Files\dotnet
      LIME_KEYSTORE_PASS: ${{ secrets.LIME_KEYSTORE_PASS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x

      - name: Install MAUI workload
        shell: pwsh
        run: |
          dotnet workload install maui-android

      - name: Restore
        shell: pwsh
        run: |
          dotnet restore App/MelonLoader.Installer.App.csproj

      - name: Create Android keystore
        shell: pwsh
        run: |
          Set-PSDebug -Strict

          if (-not $env:LIME_KEYSTORE_PASS) {
              Write-Error "LIME_KEYSTORE_PASS secret is missing"
              exit 1
          }

          Push-Location App

          Remove-Item limeinstaller.keystore -Force -ErrorAction SilentlyContinue

          keytool -genkeypair `
            -v `
            -keystore limeinstaller.keystore `
            -alias lime `
            -keyalg RSA `
            -keysize 2048 `
            -validity 10000 `
            -storetype PKCS12 `
            -storepass "$env:LIME_KEYSTORE_PASS" `
            -keypass "$env:LIME_KEYSTORE_PASS" `
            -dname "CN=lime, OU=dev, O=lime, C=US"

          Pop-Location

      - name: Build APK
        shell: pwsh
        run: |
          Set-PSDebug -Strict

          Push-Location App

          dotnet build MelonLoader.Installer.App.csproj `
            -c Release `
            -f net8.0-android `
            -p:AndroidKeyStore=true `
            -p:AndroidSigningKeyStore=limeinstaller.keystore `
            -p:AndroidSigningKeyAlias=lime `
            -p:AndroidSigningKeyPass="$env:LIME_KEYSTORE_PASS" `
            -p:AndroidSigningStorePass="$env:LIME_KEYSTORE_PASS"

          Pop-Location

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lime-installer-apk
          path: |
            App/bin/Release/net8.0-android/*Signed.apk
