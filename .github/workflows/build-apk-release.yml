name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create global.json
        shell: pwsh
        run: |
          @'
          {
            "sdk": {
              "version": "8.0.408",
              "rollForward": "latestPatch",
              "allowPrerelease": false
            }
          }
          '@ | Out-File -Encoding utf8 global.json

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.408

      - name: Verify SDK
        run: |
          dotnet --version
          dotnet --list-sdks

      - name: Install Android workload
        run: |
          dotnet workload install maui-android

      - name: Restore
        run: |
          dotnet restore App/MelonLoader.Installer.App.csproj

      - name: Create keystore
        shell: pwsh
        run: |
          if (-not $env:KEYSTORE_PASS) {
            Write-Error "KEYSTORE_PASS secret is missing"
            exit 1
          }

          Push-Location App

          if (!(Test-Path limeinstaller.keystore)) {
            keytool -genkeypair `
              -v `
              -keystore limeinstaller.keystore `
              -alias lime `
              -keyalg RSA `
              -keysize 2048 `
              -validity 10000 `
              -storepass "$env:KEYSTORE_PASS" `
              -keypass "$env:KEYSTORE_PASS" `
              -dname "CN=lime, OU=dev, O=lime, C=US"
          }

          Pop-Location

      - name: Build APK
        shell: pwsh
        run: |
          Push-Location App

          dotnet build MelonLoader.Installer.App.csproj `
            -c Release `
            -f net8.0-android `
            -p:AndroidKeyStore=true `
            -p:AndroidSigningKeyStore=limeinstaller.keystore `
            -p:AndroidSigningKeyAlias=lime `
            -p:AndroidSigningKeyPass="$env:KEYSTORE_PASS" `
            -p:AndroidSigningStorePass="$env:KEYSTORE_PASS"

          Pop-Location

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MelonLoader-Installer
          path: App/bin/Release/net8.0-android/*.apk
