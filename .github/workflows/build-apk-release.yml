name: Build and publish MAUI installer APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.416'

      - name: Force .NET 8 SDK
        shell: pwsh
        run: |
          @"
          {
            "sdk": {
              "version": "8.0.416",
              "rollForward": "disable",
              "allowPrerelease": false
            }
          }
          "@ | Out-File -Encoding utf8 global.json

          dotnet --version
          dotnet --list-sdks

      - name: Install MAUI workload
        shell: pwsh
        run: |
          dotnet workload install maui-android --ignore-failed-sources
          dotnet workload list

      - name: Restore
        shell: pwsh
        run: |
          dotnet restore App/MelonLoader.Installer.App.csproj

      - name: Build APK
        shell: pwsh
        env:
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
        run: |
          Set-PSDebug -Strict

          Push-Location App

          if (-Not (Test-Path limeinstaller.keystore)) {
            if (-not $env:KEYSTORE_PASS) {
              Write-Error "KEYSTORE_PASS secret missing"
              exit 1
            }

            keytool -genkeypair `
              -v `
              -keystore limeinstaller.keystore `
              -alias lime `
              -keyalg RSA `
              -keysize 2048 `
              -validity 10000 `
              -storepass $env:KEYSTORE_PASS `
              -keypass $env:KEYSTORE_PASS `
              -dname "CN=lime, OU=dev, O=lime, L=, ST=, C=US"
          }

          dotnet build MelonLoader.Installer.App.csproj `
            -c Release `
            -f net8.0-android `
            -p:AndroidKeyStore=true `
            -p:AndroidSigningKeyStore=limeinstaller.keystore `
            -p:AndroidSigningKeyAlias=lime `
            -p:AndroidSigningKeyPass=$env:KEYSTORE_PASS `
            -p:AndroidSigningStorePass=$env:KEYSTORE_PASS

          Pop-Location

      - name: Find APK
        shell: pwsh
        run: |
          $apk = Get-ChildItem `
            -Path App/bin/Release/net8.0-android `
            -Filter *.apk `
            -Recurse |
            Select-Object -First 1

          if (-not $apk) {
            Write-Error "APK not found"
            exit 1
          }

          Copy-Item $apk.FullName installer.apk

      - name: Create GitHub release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: installer.apk
          asset_name: LimeLoaderInstaller.apk
          asset_content_type: application/vnd.android.package-archive
