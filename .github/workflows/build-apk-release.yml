name: Build MelonLoader Installer APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  android-build:
    runs-on: windows-latest

    env:
      KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Force GitHub runner away from .NET 10
      - name: Create global.json
        shell: pwsh
        run: |
          @'
          {
            "sdk": {
              "version": "8.0.408",
              "rollForward": "latestPatch"
            }
          }
          '@ | Out-File global.json -Encoding utf8

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.408

      # Android build tools work best with Java 17
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Verify environment
        shell: pwsh
        run: |
          dotnet --version
          java -version

      - name: Install MAUI Android workload
        shell: pwsh
        run: |
          dotnet workload install maui-android
          dotnet workload repair

      - name: Restore
        shell: pwsh
        run: |
          dotnet restore App/MelonLoader.Installer.App.csproj

      - name: Create signing keystore
        shell: pwsh
        run: |
          if (-not $env:KEYSTORE_PASS) {
              Write-Error "KEYSTORE_PASS secret is missing"
              exit 1
          }

          Push-Location App

          # Always recreate to avoid stale password problems
          if (Test-Path limeinstaller.keystore) {
              Remove-Item limeinstaller.keystore
          }

          keytool -genkeypair `
            -v `
            -keystore limeinstaller.keystore `
            -alias lime `
            -keyalg RSA `
            -keysize 2048 `
            -validity 10000 `
            -storepass "$env:KEYSTORE_PASS" `
            -keypass "$env:KEYSTORE_PASS" `
            -dname "CN=lime, OU=dev, O=lime, C=US"

          Pop-Location

      - name: Build APK
        shell: pwsh
        run: |
          Push-Location App

          dotnet build MelonLoader.Installer.App.csproj `
            -c Release `
            -f net8.0-android `
            -p:AndroidKeyStore=true `
            -p:AndroidSigningKeyStore=limeinstaller.keystore `
            -p:AndroidSigningKeyAlias=lime `
            -p:AndroidSigningKeyPass="$env:KEYSTORE_PASS" `
            -p:AndroidSigningStorePass="$env:KEYSTORE_PASS" `
            -p:JavaMaximumHeapSize=4096m

          Pop-Location

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MelonLoader-Installer-APK
          path: App/bin/Release/net8.0-android/*.apk
